name: Centelha diária

on:
  schedule:
    # O agendador do GitHub atrasa de 3 a 5 horas em repositórios gratuitos
    # (medição real deste repo). A liturgia do dia já está disponível à
    # meia-noite, então as janelas começam na virada do dia em Brasília
    # (00:05 BRT = 03:05 UTC): mesmo com 5 h de atraso, a centelha entra no ar
    # de madrugada. O script sai sem fazer nada se a centelha do dia já
    # existe, então só a primeira execução bem-sucedida gera e comita —
    # as demais custam segundos e nada mais.
    - cron: '5 3 * * *'    # 00:05 em Brasília
    - cron: '50 3 * * *'   # 00:50
    - cron: '35 4 * * *'   # 01:35
    - cron: '20 5 * * *'   # 02:20
    - cron: '5 6 * * *'    # 03:05
    - cron: '50 6 * * *'   # 03:50
    - cron: '35 7 * * *'   # 04:35
    - cron: '20 8 * * *'   # 05:20
    - cron: '5 9 * * *'    # 06:05
    - cron: '50 9 * * *'   # 06:50
    - cron: '35 10 * * *'  # 07:35
    - cron: '50 11 * * *'  # 08:50 (última rede de segurança)
  workflow_dispatch: {}  # permite disparar manualmente pelo botão "Run workflow"

permissions:
  contents: write  # necessário para o commit da reflexão do dia

concurrency:
  group: centelha-diaria
  cancel-in-progress: false

jobs:
  gerar:
    runs-on: ubuntu-latest
    env:
      TZ: America/Sao_Paulo
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-sonnet-5' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Gerar a centelha do dia
        run: node scripts/generate.mjs

      - name: Commit e push
        run: |
          git config user.name  "Oratio Bot"
          git config user.email "actions@github.com"
          git add reflections/
          if git diff --staged --quiet; then
            echo "Sem mudanças para commitar."
          else
            git commit -m "Centelha de $(date +%F)"
            git push
          fi
