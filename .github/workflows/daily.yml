name: Centelha diária

on:
  schedule:
    # O agendador do GitHub atrasa (às vezes horas) em repositórios gratuitos.
    # Várias tentativas ao longo da madrugada/manhã de Brasília (UTC-3); o script
    # sai sem fazer nada se a centelha do dia já existe, então só a primeira
    # tentativa bem-sucedida gera e comita.
    - cron: '15 7 * * *'   # 04:15 em Brasília
    - cron: '45 7 * * *'   # 04:45
    - cron: '20 8 * * *'   # 05:20
    - cron: '50 9 * * *'   # 06:50
    - cron: '50 11 * * *'  # 08:50 (última rede de segurança)
  workflow_dispatch: {}  # permite disparar manualmente pelo botão "Run workflow"

permissions:
  contents: write  # necessário para o commit da reflexão do dia

concurrency:
  group: centelha-diaria
  cancel-in-progress: false

jobs:
  gerar:
    runs-on: ubuntu-latest
    env:
      TZ: America/Sao_Paulo
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-sonnet-5' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Gerar a centelha do dia
        run: node scripts/generate.mjs

      - name: Commit e push
        run: |
          git config user.name  "Oratio Bot"
          git config user.email "actions@github.com"
          git add reflections/
          if git diff --staged --quiet; then
            echo "Sem mudanças para commitar."
          else
            git commit -m "Centelha de $(date +%F)"
            git push
          fi
